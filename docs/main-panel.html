<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grudge Warlords — Main Panel</title>
  <link rel="stylesheet" href="css/grudge-theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .app { display: flex; height: 100vh; flex-direction: column; overflow: hidden; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: linear-gradient(90deg,#1a100a,#221710,#1a100a); border-bottom: 2px solid var(--gold); flex-shrink: 0; }
    .logo h1 { font-family: var(--font-display); font-size: 15px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
    .player-info { display: flex; align-items: center; gap: 14px; font-size: 12px; }
    .player-info .name { color: var(--gold); font-family: var(--font-display); font-weight: 700; }
    .player-info .xp-bar { width: 120px; height: 6px; background: #2a1e14; border-radius: 3px; overflow: hidden; border: 1px solid #3a2a1a; }
    .player-info .xp-fill { height: 100%; width: 35%; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); border-radius: 3px; transition: width 0.3s; }
    .main-body { display: flex; flex: 1; min-height: 0; }
    .left-col { width: 260px; flex-shrink: 0; background: #1a120c; border-right: 2px solid #3a2a1a; overflow-y: auto; padding: 12px; }
    .center-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .right-col { width: 280px; flex-shrink: 0; background: #1a120c; border-left: 2px solid #3a2a1a; display: flex; flex-direction: column; }
    .tab-strip { display: flex; background: #14100a; border-bottom: 2px solid var(--gold); flex-shrink: 0; overflow-x: auto; }
    .tab-btn { border: 0; background: transparent; color: var(--muted); cursor: pointer; padding: 10px 14px; font-family: var(--font-display); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
    .tab-btn:hover { color: var(--text); background: rgba(255,215,0,0.05); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(255,215,0,0.08); }
    .content-area { flex: 1; overflow-y: auto; padding: 16px; }
    .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .stat-row .k { color: var(--muted); font-weight: 600; }
    .stat-row .v { font-family: monospace; font-size: 11px; }
    .stat-row .v.positive { color: var(--green); }
    .inv-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; padding: 8px; flex: 1; overflow-y: auto; align-content: start; }
    .inv-cell { aspect-ratio: 1; border: 2px solid #3a2a1a; border-radius: 6px; background: #221710; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--dim); position: relative; transition: all 0.15s; }
    .inv-cell:hover { border-color: var(--gold); box-shadow: 0 0 8px rgba(212,175,55,0.2); }
    .inv-cell.has-item { border-color: #3a2a1a; }
    .inv-cell img { width: 100%; height: 100%; object-fit: contain; padding: 4px; image-rendering: pixelated; }
    .inv-cell .inv-tier { position: absolute; top: 1px; right: 2px; font-size: 6px; font-weight: 700; padding: 0 3px; border-radius: 2px; }
    .inv-cell .inv-stack { position: absolute; bottom: 1px; right: 2px; font-size: 7px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px #000; }
    .inv-header { padding: 10px 12px; border-bottom: 1px solid #3a2a1a; display: flex; justify-content: space-between; align-items: center; }
    .inv-header h3 { font-family: var(--font-display); font-size: 12px; color: var(--gold); text-transform: uppercase; }
    .inv-count { font-size: 10px; color: var(--dim); }
    .hotbar { display: flex; gap: 4px; justify-content: center; padding: 6px; background: #120c06; border-top: 2px solid var(--gold); align-items: center; }
    .hb-slot { width: 44px; height: 44px; border: 2px solid #3a2a1a; border-radius: 6px; background: #2a1e14; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--dim); cursor: pointer; position: relative; transition: all 0.15s; }
    .hb-slot:hover { border-color: var(--gold); }
    .hb-slot .key { position: absolute; top: 2px; left: 4px; font-size: 8px; color: var(--muted); }
    .hb-slot.skill { border-color: #4a3520; }
    .hb-slot.consumable { border-color: #2a3520; }
    .hb-slot img { width: 100%; height: 100%; object-fit: contain; padding: 3px; image-rendering: pixelated; }
    .hb-divider { width: 2px; height: 30px; background: #3a2a1a; margin: 0 4px; border-radius: 1px; }
    .section-title { font-family: var(--font-display); font-size: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 10px; padding-left: 12px; border-left: 3px solid var(--gold); }

    /* ===== Profession Bars ===== */
    .prof-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 11px; }
    .prof-row .prof-name { color: var(--muted); width: 70px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .prof-row .prof-bar { flex: 1; height: 8px; background: #221710; border-radius: 4px; overflow: hidden; border: 1px solid #3a2a1a; }
    .prof-row .prof-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .prof-row .prof-lv { font-family: monospace; font-size: 10px; color: var(--gold); width: 20px; text-align: right; }

    /* ===== Equipment Panel Layout ===== */
    .eq-panel { display: flex; align-items: stretch; gap: 0; width: 100%; min-height: 480px; }
    .eq-col { display: flex; flex-direction: column; gap: 6px; justify-content: center; padding: 8px 6px; width: 86px; flex-shrink: 0; }
    .eq-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(ellipse at center, rgba(212,175,55,0.04) 0%, transparent 70%); border-left: 1px solid rgba(212,175,55,0.1); border-right: 1px solid rgba(212,175,55,0.1); min-width: 160px; }
    .eq-center .silhouette { width: 130px; height: 240px; background: linear-gradient(180deg, rgba(30,20,12,0.9) 0%, rgba(20,14,8,0.7) 100%); border: 2px solid rgba(212,175,55,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 60px; text-shadow: 0 0 20px rgba(212,175,55,0.2); }
    .eq-slot { width: 68px; height: 68px; border: 2px solid var(--gold-dim); border-radius: 8px; background: linear-gradient(180deg, #2e1f14 0%, #221710 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 8px; color: var(--muted); text-transform: uppercase; position: relative; transition: all 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.4); }
    .eq-slot:hover { border-color: var(--gold); box-shadow: 0 0 12px rgba(212,175,55,0.3), inset 0 2px 4px rgba(0,0,0,0.4); transform: scale(1.05); z-index: 2; }
    .eq-slot.equipped { border-color: var(--gold); background: linear-gradient(180deg, #3a2a1a 0%, #2e1f14 100%); }
    .eq-slot .slot-icon { width: 44px; height: 44px; object-fit: contain; image-rendering: pixelated; filter: drop-shadow(0 0 4px rgba(212,175,55,0.3)); }
    .eq-slot .slot-label { font-size: 7px; margin-top: 1px; letter-spacing: 1px; color: var(--dim); }
    .eq-slot .slot-tier { position: absolute; top: 2px; right: 3px; font-size: 7px; font-weight: 700; padding: 1px 4px; border-radius: 3px; }
    .eq-slot .slot-placeholder { font-size: 18px; opacity: 0.15; margin-bottom: 2px; }
    .eq-summary { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 14px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(212,175,55,0.08); }
    .eq-summary .eq-sum-item { text-align: center; min-width: 50px; }
    .eq-summary .eq-sum-val { font-family: monospace; font-size: 13px; font-weight: 700; color: var(--green); }
    .eq-summary .eq-sum-lbl { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ===== Attribute Cards ===== */
    .attr-card { background: linear-gradient(180deg, #221710 0%, #1a120c 100%); border: 2px solid #3a2a1a; border-radius: 8px; padding: 14px; margin-bottom: 10px; transition: all 0.2s; cursor: default; }
    .attr-card:hover { border-color: var(--gold-dim); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
    .attr-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .attr-card-head img { width: 28px; height: 28px; object-fit: contain; image-rendering: pixelated; }
    .attr-card-head .attr-name { font-family: var(--font-display); font-size: 13px; font-weight: 700; }
    .attr-card-head .attr-role { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .attr-desc { font-size: 10px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; }
    .attr-formula { font-size: 9px; color: var(--dim); font-family: monospace; padding: 6px 8px; background: rgba(0,0,0,0.3); border-radius: 4px; border-left: 2px solid var(--gold-dim); }
    .attr-gains { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .attr-gain-chip { font-size: 8px; padding: 2px 6px; border-radius: 10px; background: rgba(68,255,68,0.1); color: var(--green); }
    .attr-points-bar { display: flex; align-items: center; gap: 8px; padding: 12px 0; }
    .attr-points-bar .pts-label { font-size: 11px; color: var(--muted); }
    .attr-points-bar .pts-val { font-family: monospace; font-size: 14px; color: var(--gold); font-weight: 700; }

    /* ===== Item Hover Tooltip ===== */
    .eq-tooltip { position: fixed; z-index: 9999; width: 320px; max-height: 480px; overflow-y: auto; background: linear-gradient(180deg, hsl(225 25% 14%) 0%, hsl(225 28% 10%) 50%, hsl(225 25% 8%) 100%); border: 2px solid var(--gold); border-radius: 8px; padding: 16px; pointer-events: none; opacity: 0; transition: opacity 0.15s; box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 16px rgba(212,175,55,0.15); }
    .eq-tooltip.visible { opacity: 1; }
    .eq-tooltip .tt-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .eq-tooltip .tt-icon { width: 56px; height: 56px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; border: 2px solid var(--gold-dim); }
    .eq-tooltip .tt-icon img { width: 100%; height: 100%; object-fit: contain; }
    .eq-tooltip .tt-name { font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: 0.03em; }
    .eq-tooltip .tt-sub { color: var(--muted); font-size: 10px; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
    .eq-tooltip .tt-tier { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 9px; font-weight: 700; margin-top: 4px; }
    .eq-tooltip .tt-action { font-size: 9px; color: var(--gold); margin-top: 6px; text-align: center; padding: 4px; background: rgba(212,175,55,0.08); border-radius: 4px; }
    .eq-tooltip .tt-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(212,175,55,0.15); }
    .eq-tooltip .tt-section-title { font-size: 8px; text-transform: uppercase; color: var(--dim); letter-spacing: 1px; margin-bottom: 6px; font-weight: 700; }
    .eq-tooltip .tt-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .eq-tooltip .tt-stat { background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; border-left: 2px solid var(--green); }
    .eq-tooltip .tt-stat-label { font-size: 8px; color: var(--dim); text-transform: uppercase; }
    .eq-tooltip .tt-stat-val { font-size: 12px; font-weight: 700; color: var(--green); font-family: monospace; }
    .eq-tooltip .tt-abilities li { padding: 3px 0; font-size: 10px; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.03); list-style: none; }
    .eq-tooltip .tt-signature { background: linear-gradient(135deg, rgba(212,168,75,0.15), rgba(240,216,144,0.05)); padding: 6px 10px; border-radius: 6px; border-left: 3px solid var(--gold); margin-top: 6px; font-size: 10px; }
    .eq-tooltip .tt-passive { display: inline-block; background: rgba(74,158,255,0.15); color: #4a9eff; padding: 2px 8px; border-radius: 12px; font-size: 9px; margin: 2px 3px 2px 0; }
    .eq-tooltip .tt-lore { font-style: italic; color: var(--dim); font-size: 10px; line-height: 1.4; }
    .eq-tooltip .tt-uuid { font-family: monospace; font-size: 8px; color: var(--dim); margin-top: 6px; word-break: break-all; }
    .back-link { display: inline-block; padding: 8px 16px; color: var(--gold); font-size: 0.9em; background: #14100a; }

    /* ===== Error Banner ===== */
    .error-banner { padding: 12px 16px; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); border-radius: 6px; color: #ff6666; font-size: 11px; margin-bottom: 12px; display: none; }
    .error-banner.visible { display: block; }

    @media(max-width:1000px) { .left-col, .right-col { display: none; } }
    @media(max-width:700px) { .eq-col { width: 70px; } .eq-slot { width: 58px; height: 58px; } .eq-slot .slot-icon { width: 36px; height: 36px; } }
  </style>
</head>
<body>
<div class="app">
  <header class="top-bar">
    <div class="logo"><a href="index.html" style="color:var(--gold)">← Hub</a> <h1 style="display:inline;margin-left:12px" class="gold-text">Grudge Warlords</h1></div>
    <div class="player-info">
      <span class="name" id="playerName">Guest</span>
      <span style="color:var(--muted);font-size:11px" id="playerClass">Lv.1 Warrior</span>
      <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
    </div>
  </header>
  <div class="main-body">
    <aside class="left-col" id="leftCol"></aside>
    <main class="center-col">
      <div class="error-banner" id="errorBanner"></div>
      <nav class="tab-strip" id="tabStrip"></nav>
      <div class="content-area" id="contentArea"></div>
    </main>
    <aside class="right-col">
      <div class="inv-header">
        <h3>Inventory</h3>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="inv-count" id="invCount">0/42</span>
          <span style="font-family:monospace;font-size:12px;color:var(--gold)" id="goldDisplay">250 Gold</span>
        </div>
      </div>
      <div class="inv-grid" id="invGrid"></div>
    </aside>
  </div>
  <footer class="hotbar" id="hotbar"></footer>
</div>

<!-- Item Hover Tooltip -->
<div class="eq-tooltip" id="eqTooltip"></div>

<script>
  const CDN = 'https://molochdagod.github.io/ObjectStore';
  const TABS = ['Equipment','Attributes','Skills','Crafting','Quests'];
  let activeTab = 'Equipment', allItems = [], allRecipes = [], allAttributes = [], allMaterials = [];

  // Equipment slot definitions — 6 per side, matching ItemBrowser armor slots
  const LEFT_SLOTS  = ['Helm','Shoulder','Chest','Legs','Boots','Belt'];
  const RIGHT_SLOTS = ['Mainhand','Offhand','Gloves','Cape','Ring','Necklace'];
  const ALL_SLOTS = [...LEFT_SLOTS, ...RIGHT_SLOTS];

  // Slot placeholder icons
  const SLOT_ICONS = {
    Helm:'🪖', Shoulder:'🛡', Chest:'🎽', Legs:'👖', Boots:'🥾', Belt:'⛓',
    Mainhand:'⚔', Offhand:'🛡', Gloves:'🧤', Cape:'🧣', Ring:'💍', Necklace:'📿'
  };

  // Equipped items (slot → item UUID). Connect to Grudge backend for real data.
  const equippedItems = {};

  // Inventory items (array of {uuid, stack})
  let inventoryItems = [];

  // Tier colors matching ObjectStore tier system
  const TIER_COLORS = {
    1:'#8b7355', 2:'#a8a8a8', 3:'#4a9eff', 4:'#9d4dff',
    5:'#ff4d4d', 6:'#ffaa00', 7:'#d4a84b', 8:'#f0d890'
  };
  const TIER_LABELS = {
    1:'Common', 2:'Uncommon', 3:'Rare', 4:'Epic',
    5:'Legendary', 6:'Mythic', 7:'Relic', 8:'Artifact'
  };

  // Base stats before gear
  const BASE_STATS = { health:250, mana:100, stamina:100, damage:0, defense:0, speed:1.0, crit:0, block:0 };

  // Profession data (5 harvesting professions)
  const PROFESSIONS = [
    { name:'Mining', color:'var(--miner)', level:3, xp:45 },
    { name:'Forestry', color:'var(--forester)', level:2, xp:60 },
    { name:'Mysticism', color:'var(--mystic)', level:1, xp:20 },
    { name:'Cooking', color:'var(--chef)', level:4, xp:80 },
    { name:'Engineering', color:'var(--engineer)', level:1, xp:10 },
  ];

  // Runtime icon URL fixer — remaps legacy broken paths to real ObjectStore paths
  function fixIconUrl(url) {
    if (!url) return '';
    if (url.includes('/icons/food/')) {
      const map = { 'food_red.png':'food_steak_cooked.png', 'food_green.png':'food_grapes.png', 'food_blue.png':'food_fish_red.png' };
      const file = url.split('/').pop();
      return `${CDN}/icons/consumables/${map[file] || 'food_steak_cooked.png'}`;
    }
    if (url.includes('/icons/potions/')) {
      return `${CDN}/icons/consumables/health_potion.png`;
    }
    return url;
  }

  function findItemByUuid(uuid) { return allItems.find(i => i.uuid === uuid); }
  function findAnyItem(uuid) { return findItemByUuid(uuid) || allMaterials.find(m => m.uuid === uuid); }

  // ── Init ────────────────────────────────────────────────────────────
  async function init() {
    try {
      const [itemsRes, recipesRes, attrsRes, matsRes] = await Promise.all([
        fetch('/data/master-items.json').then(r => { if(!r.ok) throw new Error('items '+r.status); return r.json(); }),
        fetch('/data/master-recipes.json').then(r => { if(!r.ok) throw new Error('recipes '+r.status); return r.json(); }),
        fetch('/data/master-attributes.json').then(r => { if(!r.ok) throw new Error('attrs '+r.status); return r.json(); }).catch(() => null),
        fetch('/data/master-materials.json').then(r => { if(!r.ok) throw new Error('mats '+r.status); return r.json(); }).catch(() => null),
      ]);
      allItems = itemsRes.items || [];
      allRecipes = recipesRes.recipes || [];
      allAttributes = attrsRes?.attributes || [];
      allMaterials = matsRes?.materials || [];
    } catch (err) {
      showError('Failed to load game data: ' + err.message + '. Check /data/ files.');
    }

    autoEquipDemo();
    populateInventoryDemo();

    // Tab strip
    document.getElementById('tabStrip').innerHTML = TABS.map(t =>
      `<button class="tab-btn ${t===activeTab?'active':''}" onclick="switchTab('${t}')">${t}</button>`
    ).join('');

    renderLeftCol();
    renderInventory();
    renderHotbar();
    renderTab();
  }

  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = msg;
    el.classList.add('visible');
  }

  // ── Demo Data Population ────────────────────────────────────────────
  function autoEquipDemo() {
    const slotCategoryMap = {
      'Mainhand':'swords', 'Offhand':'shields', 'Helm':'hammers', 'Chest':'axes',
      'Shoulder':'maces', 'Gloves':'daggers', 'Boots':'bows', 'Legs':'spears',
      'Cape':'greatswords', 'Ring':'crossbows', 'Belt':'greataxes', 'Necklace':'tomes',
    };
    for (const [slot, cat] of Object.entries(slotCategoryMap)) {
      const match = allItems.find(i => i.type === 'weapon' && i.category === cat);
      if (match) equippedItems[slot] = match.uuid;
    }
  }

  function populateInventoryDemo() {
    inventoryItems = [];
    // Add a spread of items: different weapon types, food, potions
    const cats = ['swords','daggers','bows','hammers','shields','guns','fireStaves','frostStaves'];
    cats.forEach(cat => {
      const items = allItems.filter(i => i.type === 'weapon' && i.category === cat);
      if (items.length > 1) inventoryItems.push({ uuid: items[1].uuid, stack: 1 });
    });
    // Add food and potions
    allItems.filter(i => i.type === 'food').slice(0, 6).forEach(i => inventoryItems.push({ uuid: i.uuid, stack: Math.floor(Math.random()*15)+1 }));
    allItems.filter(i => i.type === 'potion').slice(0, 4).forEach(i => inventoryItems.push({ uuid: i.uuid, stack: Math.floor(Math.random()*8)+1 }));
  }

  // ── Left Column: Stats + Professions ────────────────────────────────
  function renderLeftCol() {
    const stats = computeStats();
    const col = document.getElementById('leftCol');
    col.innerHTML = `
      <div class="section-title">Combat Stats</div>
      <div class="stat-row"><span class="k">Health</span><span class="v">${stats.health}</span></div>
      <div class="stat-row"><span class="k">Mana</span><span class="v">${stats.mana}</span></div>
      <div class="stat-row"><span class="k">Stamina</span><span class="v">${stats.stamina}</span></div>
      <div class="stat-row"><span class="k">Damage</span><span class="v positive">${stats.damage}</span></div>
      <div class="stat-row"><span class="k">Crit %</span><span class="v">${stats.crit}%</span></div>
      <div class="stat-row"><span class="k">Defense</span><span class="v">${stats.defense}</span></div>
      <div class="stat-row"><span class="k">Block %</span><span class="v">${stats.block}%</span></div>
      <div class="stat-row"><span class="k">Speed</span><span class="v">${stats.speed.toFixed(1)}</span></div>
      <div class="section-title" style="margin-top:20px;">Professions</div>
      ${PROFESSIONS.map(p => `
        <div class="prof-row">
          <span class="prof-name">${p.name}</span>
          <div class="prof-bar"><div class="prof-fill" style="width:${p.xp}%;background:${p.color};"></div></div>
          <span class="prof-lv">${p.level}</span>
        </div>
      `).join('')}
      <div class="section-title" style="margin-top:20px;">Equipped</div>
      <div style="font-size:10px;color:var(--dim);">${Object.keys(equippedItems).length} / ${ALL_SLOTS.length} slots filled</div>
    `;
  }

  function computeStats() {
    const s = { ...BASE_STATS };
    for (const uuid of Object.values(equippedItems)) {
      const item = findItemByUuid(uuid);
      if (!item?.stats) continue;
      if (item.stats.damage) s.damage += item.stats.damage;
      if (item.stats.defense) s.defense += item.stats.defense;
      if (item.stats.crit) s.crit += item.stats.crit;
      if (item.stats.block) s.block += item.stats.block;
      if (item.stats.speed) s.speed += item.stats.speed / 100;
      if (item.stats.health) s.health += item.stats.health;
    }
    return s;
  }

  // ── Inventory ──────────────────────────────────────────────────────
  function renderInventory() {
    const grid = document.getElementById('invGrid');
    const totalSlots = 42;
    let html = '';
    for (let i = 0; i < totalSlots; i++) {
      const inv = inventoryItems[i];
      if (inv) {
        const item = findAnyItem(inv.uuid);
        if (item) {
          const tier = item.tier || 1;
          const tc = TIER_COLORS[tier] || '#3a2a1a';
          const icon = item.iconUrl || '';
          html += `<div class="inv-cell has-item" data-inv-idx="${i}" data-uuid="${inv.uuid}" style="border-color:${tc};">`;
          if (icon) html += `<img src="${fixIconUrl(icon)}" alt="${esc(item.name)}" onerror="this.style.display='none'">`;
          html += `<span class="inv-tier" style="background:${tc};color:#000;">T${tier}</span>`;
          if (inv.stack > 1) html += `<span class="inv-stack">${inv.stack}</span>`;
          html += `</div>`;
        } else {
          html += `<div class="inv-cell"></div>`;
        }
      } else {
        html += `<div class="inv-cell"></div>`;
      }
    }
    grid.innerHTML = html;
    document.getElementById('invCount').textContent = `${inventoryItems.length}/${totalSlots}`;
    attachInventoryListeners();
  }

  function attachInventoryListeners() {
    document.querySelectorAll('.inv-cell[data-uuid]').forEach(el => {
      el.addEventListener('mouseenter', onInvHover);
      el.addEventListener('mousemove', onSlotMove);
      el.addEventListener('mouseleave', onSlotLeave);
      el.addEventListener('click', onInvClick);
    });
  }

  function onInvHover(e) {
    const uuid = e.currentTarget.dataset.uuid;
    if (!uuid) return;
    const item = findAnyItem(uuid);
    if (!item) return;
    const tt = document.getElementById('eqTooltip');
    tt.innerHTML = buildTooltipHTML(item, 'Click to equip');
    tt.style.borderColor = TIER_COLORS[item.tier] || 'var(--gold)';
    positionTooltip(e);
    tt.classList.add('visible');
  }

  function onInvClick(e) {
    const uuid = e.currentTarget.dataset.uuid;
    const idx = parseInt(e.currentTarget.dataset.invIdx);
    if (!uuid) return;
    const item = findItemByUuid(uuid);
    if (!item) return;
    // Find a compatible empty slot (or first slot of type)
    const slot = findBestSlot(item);
    if (slot) {
      // If slot already has an item, swap to inventory
      if (equippedItems[slot]) {
        inventoryItems[idx] = { uuid: equippedItems[slot], stack: 1 };
      } else {
        inventoryItems.splice(idx, 1);
      }
      equippedItems[slot] = uuid;
      refreshAll();
    }
  }

  function findBestSlot(item) {
    if (item.type !== 'weapon') return null;
    const cat = item.category;
    // Weapon category to preferred slot
    const preferred = { swords:'Mainhand', shields:'Offhand', daggers:'Mainhand', bows:'Mainhand',
      crossbows:'Mainhand', guns:'Mainhand', spears:'Mainhand', hammers:'Mainhand', axes:'Mainhand',
      maces:'Mainhand', greatswords:'Mainhand', greataxes:'Mainhand', tomes:'Offhand',
      fireStaves:'Mainhand', frostStaves:'Mainhand', holyStaves:'Mainhand', lightningStaves:'Mainhand', natureStaves:'Mainhand' };
    const pref = preferred[cat] || 'Mainhand';
    // Try preferred slot first, then any empty slot
    if (!equippedItems[pref]) return pref;
    const empty = ALL_SLOTS.find(s => !equippedItems[s]);
    return empty || pref; // if all full, replace preferred
  }

  // ── Hotbar: slots 1-4 skills, 5 divider, 6-8 consumables ──────────
  function renderHotbar() {
    const consumables = inventoryItems.filter(inv => {
      const item = findItemByUuid(inv.uuid);
      return item && (item.type === 'food' || item.type === 'potion');
    }).slice(0, 3);
    let html = '';
    // Skills (1-4)
    for (let i = 0; i < 4; i++) {
      html += `<div class="hb-slot skill"><span class="key">${i+1}</span></div>`;
    }
    // Divider (slot 5 empty)
    html += `<div class="hb-divider"></div>`;
    // Consumables (6-8)
    for (let i = 0; i < 3; i++) {
      const c = consumables[i];
      if (c) {
        const item = findItemByUuid(c.uuid);
        const icon = item?.iconUrl || '';
        html += `<div class="hb-slot consumable" data-uuid="${c.uuid}"><span class="key">${i+6}</span>`;
        if (icon) html += `<img src="${fixIconUrl(icon)}" alt="${esc(item?.name)}" onerror="this.style.display='none'">`;
        html += `</div>`;
      } else {
        html += `<div class="hb-slot consumable"><span class="key">${i+6}</span></div>`;
      }
    }
    document.getElementById('hotbar').innerHTML = html;
    // Hotbar tooltips
    document.querySelectorAll('.hb-slot[data-uuid]').forEach(el => {
      el.addEventListener('mouseenter', e => {
        const item = findItemByUuid(el.dataset.uuid);
        if (!item) return;
        const tt = document.getElementById('eqTooltip');
        tt.innerHTML = buildTooltipHTML(item);
        tt.style.borderColor = TIER_COLORS[item.tier] || 'var(--gold)';
        positionTooltip(e);
        tt.classList.add('visible');
      });
      el.addEventListener('mousemove', onSlotMove);
      el.addEventListener('mouseleave', onSlotLeave);
    });
  }

  // ── Refresh everything after equip/unequip ─────────────────────────
  function refreshAll() {
    renderLeftCol();
    renderInventory();
    renderHotbar();
    if (activeTab === 'Equipment') renderTab();
  }

  function switchTab(t) {
    activeTab = t;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent === t));
    renderTab();
  }

  function renderTab() {
    const area = document.getElementById('contentArea');
    if (activeTab === 'Equipment') {
      area.innerHTML = renderEquipmentPanel();
      attachSlotListeners();
    } else if (activeTab === 'Attributes') {
      area.innerHTML = renderAttributesTab();
    } else if (activeTab === 'Crafting') {
      area.innerHTML = renderCraftingTab();
    } else if (activeTab === 'Skills') {
      area.innerHTML = `<div class="section-title">Weapon Skill Trees</div><p style="color:var(--muted)">Skill trees loaded from master data — ${allItems.filter(i=>i.type==='weapon').length} weapons available</p>`;
    } else if (activeTab === 'Quests') {
      area.innerHTML = `<div class="section-title">Active Quests</div><p style="color:var(--muted)">Connect to Grudge backend to view quests</p>`;
    } else {
      area.innerHTML = `<div class="section-title">${activeTab}</div><p style="color:var(--muted)">Content loaded from shared game data</p>`;
    }
  }

  // ── Equipment Panel ─────────────────────────────────────────────────
  function renderEquipmentPanel() {
    const stats = computeStats();
    return `
      <div class="section-title" style="text-align:center;border-left:0;padding-left:0;">Grudge Warlord</div>
      <div style="text-align:center;font-family:var(--font-display);font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Human &bull; Warrior</div>
      <div class="eq-panel">
        <div class="eq-col">
          ${LEFT_SLOTS.map(s => renderSlot(s)).join('')}
        </div>
        <div class="eq-center">
          <div class="silhouette">&#9876;</div>
        </div>
        <div class="eq-col">
          ${RIGHT_SLOTS.map(s => renderSlot(s)).join('')}
        </div>
      </div>
      <div class="eq-summary">
        <div class="eq-sum-item"><div class="eq-sum-val">${stats.damage}</div><div class="eq-sum-lbl">Damage</div></div>
        <div class="eq-sum-item"><div class="eq-sum-val">${stats.defense}</div><div class="eq-sum-lbl">Defense</div></div>
        <div class="eq-sum-item"><div class="eq-sum-val">${stats.health}</div><div class="eq-sum-lbl">Health</div></div>
        <div class="eq-sum-item"><div class="eq-sum-val">${stats.crit}%</div><div class="eq-sum-lbl">Crit</div></div>
        <div class="eq-sum-item"><div class="eq-sum-val">${stats.block}%</div><div class="eq-sum-lbl">Block</div></div>
        <div class="eq-sum-item"><div class="eq-sum-val">${stats.speed.toFixed(1)}</div><div class="eq-sum-lbl">Speed</div></div>
      </div>
      <div style="text-align:center;margin-top:10px;font-size:10px;color:var(--dim);">Click equipped slot to unequip &middot; Click inventory item to equip &middot; <a href="https://objectstore.vercel.app/ItemBrowser" target="_blank" rel="noopener" style="font-size:10px;">Item Browser &#8599;</a></div>
    `;
  }

  function renderSlot(slotName) {
    const uuid = equippedItems[slotName];
    const item = uuid ? findItemByUuid(uuid) : null;
    const isEquipped = !!item;
    const tier = item ? item.tier : 0;
    const tierColor = TIER_COLORS[tier] || '#3a2a1a';
    const iconHtml = item && item.iconUrl
      ? `<img class="slot-icon" src="${fixIconUrl(item.iconUrl)}" alt="${esc(item.name)}" onerror="this.style.display='none'">`
      : `<span class="slot-placeholder">${SLOT_ICONS[slotName] || '◻'}</span>`;
    const tierBadge = item
      ? `<span class="slot-tier" style="background:${tierColor};color:#000;">T${tier}</span>`
      : '';
    return `<div class="eq-slot ${isEquipped ? 'equipped' : ''}" data-slot="${slotName}" data-uuid="${uuid||''}" style="${isEquipped ? 'border-color:'+tierColor : ''}">
      ${tierBadge}
      ${iconHtml}
      <span class="slot-label">${slotName}</span>
    </div>`;
  }

  // ── Attributes Tab ─────────────────────────────────────────────────
  function renderAttributesTab() {
    if (!allAttributes.length) {
      return `<div class="section-title">Attributes</div><p style="color:var(--muted)">Attribute data not loaded. Check /data/master-attributes.json.</p>`;
    }
    let html = `<div class="section-title">Character Attributes</div>`;
    html += `<div class="attr-points-bar"><span class="pts-label">Available Points:</span><span class="pts-val">20</span><span class="pts-label" style="margin-left:16px;">Per Level:</span><span class="pts-val">+7</span></div>`;
    allAttributes.forEach(attr => {
      const iconUrl = attr.icon ? `${CDN}/${attr.icon}` : '';
      html += `<div class="attr-card" style="border-left:3px solid ${attr.color || 'var(--gold)'};">`;
      html += `<div class="attr-card-head">`;
      if (iconUrl) html += `<img src="${esc(iconUrl)}" alt="${esc(attr.name)}" onerror="this.style.display='none'">`;
      html += `<div><div class="attr-name" style="color:${attr.color || 'var(--gold)'};">${esc(attr.name)}</div>`;
      html += `<div class="attr-role">${esc(attr.role)}</div></div></div>`;
      html += `<div class="attr-desc">${esc(attr.description)}</div>`;
      html += `<div class="attr-formula">${esc(attr.formula)}</div>`;
      if (attr.gains) {
        html += `<div class="attr-gains">`;
        for (const [, g] of Object.entries(attr.gains)) {
          const sign = g.value >= 0 ? '+' : '';
          html += `<span class="attr-gain-chip">${esc(g.label)} ${sign}${g.value}</span>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    });
    return html;
  }

  // ── Crafting Tab ───────────────────────────────────────────────────
  function renderCraftingTab() {
    const recipes = allRecipes.slice(0, 30);
    return `<div class="section-title">Crafting Recipes (${allRecipes.length} total)</div>` +
      recipes.map(r => `<div style="padding:10px;margin-bottom:6px;background:#1e1510;border-radius:8px;border-left:3px solid var(--gold);transition:all 0.15s;cursor:default;" onmouseenter="this.style.borderLeftColor='var(--gold-light)'" onmouseleave="this.style.borderLeftColor='var(--gold)'">
        <div style="font-weight:700;font-size:13px">${esc(r.name)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">${esc(r.profession)} · ${esc(r.category)}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:4px">${r.materials.map(m=>`${esc(m.name)} ×${m.quantity}`).join(', ')}</div>
        <div style="font-size:8px;color:var(--dim);margin-top:4px;font-family:monospace;opacity:0.6">${esc(r.uuid)}</div>
      </div>`).join('');
  }

  // ── Slot Interactions ──────────────────────────────────────────────
  function attachSlotListeners() {
    document.querySelectorAll('.eq-slot').forEach(el => {
      el.addEventListener('mouseenter', onSlotHover);
      el.addEventListener('mousemove', onSlotMove);
      el.addEventListener('mouseleave', onSlotLeave);
      el.addEventListener('click', onSlotClick);
    });
  }

  function onSlotHover(e) {
    const uuid = e.currentTarget.dataset.uuid;
    if (!uuid) return;
    const item = findItemByUuid(uuid);
    if (!item) return;
    const tt = document.getElementById('eqTooltip');
    tt.innerHTML = buildTooltipHTML(item, 'Click to unequip');
    tt.style.borderColor = TIER_COLORS[item.tier] || 'var(--gold)';
    positionTooltip(e);
    tt.classList.add('visible');
  }

  function onSlotMove(e) { positionTooltip(e); }

  function onSlotLeave() {
    document.getElementById('eqTooltip').classList.remove('visible');
  }

  function onSlotClick(e) {
    const slot = e.currentTarget.dataset.slot;
    const uuid = e.currentTarget.dataset.uuid;
    if (!uuid || !slot) return;
    // Unequip: move item back to inventory
    inventoryItems.push({ uuid, stack: 1 });
    delete equippedItems[slot];
    onSlotLeave();
    refreshAll();
  }

  function positionTooltip(e) {
    const tt = document.getElementById('eqTooltip');
    const pad = 16;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    if (x + 340 > window.innerWidth) x = e.clientX - 340;
    if (y + 400 > window.innerHeight) y = Math.max(8, e.clientY - 400);
    tt.style.left = x + 'px';
    tt.style.top = y + 'px';
  }

  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

  function buildTooltipHTML(item, actionHint) {
    const tier = item.tier || 1;
    const tc = TIER_COLORS[tier] || '#8b7355';
    const tl = item.tierLabel || TIER_LABELS[tier] || 'Common';
    let h = '';

    // Header: icon + name + tier
    h += `<div class="tt-header">`;
    if (item.iconUrl) {
      h += `<div class="tt-icon" style="background:linear-gradient(135deg,${tc}33,rgba(0,0,0,0.3));border-color:${tc};"><img src="${esc(fixIconUrl(item.iconUrl))}" alt="${esc(item.name)}"></div>`;
    }
    h += `<div>
      <div class="tt-name" style="color:${tc};">${esc(item.name)}</div>
      <div class="tt-sub">${esc(item.type)} &bull; ${esc(item.category)}</div>
      <span class="tt-tier" style="background:${tc};color:#000;">${tl} &mdash; T${tier}</span>
    </div></div>`;

    // Stats
    if (item.stats && Object.keys(item.stats).length) {
      h += `<div class="tt-section"><div class="tt-section-title">Stats</div><div class="tt-stats">`;
      for (const [k, v] of Object.entries(item.stats)) {
        const label = k.replace(/([A-Z])/g, ' $1').trim();
        h += `<div class="tt-stat"><div class="tt-stat-label">${esc(label)}</div><div class="tt-stat-val">+${v}</div></div>`;
      }
      h += `</div></div>`;
    }

    // Abilities
    if (item.abilities && item.abilities.length) {
      h += `<div class="tt-section"><div class="tt-section-title">Abilities</div><ul class="tt-abilities">`;
      item.abilities.forEach(a => { h += `<li>&#9889; ${esc(a)}</li>`; });
      h += `</ul>`;
      if (item.signature) {
        h += `<div class="tt-signature"><strong>&#11088; Signature:</strong> ${esc(item.signature)}</div>`;
      }
      h += `</div>`;
    }

    // Passives
    if (item.passives && item.passives.length) {
      h += `<div class="tt-section"><div class="tt-section-title">Passives</div>`;
      item.passives.forEach(p => { h += `<span class="tt-passive">${esc(p)}</span>`; });
      h += `</div>`;
    }

    // Lore
    if (item.description) {
      h += `<div class="tt-section"><div class="tt-section-title">Lore</div><p class="tt-lore">&ldquo;${esc(item.description)}&rdquo;</p></div>`;
    }

    // Source
    if (item.craftedBy) {
      h += `<div class="tt-section"><div class="tt-section-title">Source</div><div style="font-size:10px;">Crafted by: <strong style="color:var(--gold)">${esc(item.craftedBy)}</strong></div></div>`;
    }

    // UUID
    h += `<div class="tt-uuid">${esc(item.uuid)}</div>`;

    // Action hint
    if (actionHint) {
      h += `<div class="tt-action">${esc(actionHint)}</div>`;
    }

    return h;
  }

  init();
</script>
</body>
</html>
