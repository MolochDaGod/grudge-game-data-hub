<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grudge Warlords — Main Panel</title>
  <link rel="stylesheet" href="css/grudge-theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .app { display: flex; height: 100vh; flex-direction: column; overflow: hidden; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: linear-gradient(90deg,#1a100a,#221710,#1a100a); border-bottom: 2px solid var(--gold); flex-shrink: 0; }
    .logo h1 { font-family: var(--font-display); font-size: 15px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
    .player-info { display: flex; align-items: center; gap: 14px; font-size: 12px; }
    .player-info .name { color: var(--gold); font-family: var(--font-display); font-weight: 700; }
    .main-body { display: flex; flex: 1; min-height: 0; }
    .left-col { width: 260px; flex-shrink: 0; background: #1a120c; border-right: 2px solid #3a2a1a; overflow-y: auto; padding: 12px; }
    .center-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .right-col { width: 280px; flex-shrink: 0; background: #1a120c; border-left: 2px solid #3a2a1a; display: flex; flex-direction: column; }
    .tab-strip { display: flex; background: #14100a; border-bottom: 2px solid var(--gold); flex-shrink: 0; overflow-x: auto; }
    .tab-btn { border: 0; background: transparent; color: var(--muted); cursor: pointer; padding: 10px 14px; font-family: var(--font-display); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; border-bottom: 2px solid transparent; white-space: nowrap; }
    .tab-btn:hover { color: var(--text); background: rgba(255,215,0,0.05); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(255,215,0,0.08); }
    .content-area { flex: 1; overflow-y: auto; padding: 16px; }
    .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .stat-row .k { color: var(--muted); font-weight: 600; }
    .stat-row .v { font-family: monospace; font-size: 11px; }
    .inv-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; padding: 8px; flex: 1; overflow-y: auto; align-content: start; }
    .inv-cell { aspect-ratio: 1; border: 2px solid #3a2a1a; border-radius: 6px; background: #221710; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--dim); position: relative; }
    .inv-cell:hover { border-color: var(--gold); }
    .inv-cell img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
    .inv-header { padding: 10px 12px; border-bottom: 1px solid #3a2a1a; display: flex; justify-content: space-between; }
    .inv-header h3 { font-family: var(--font-display); font-size: 12px; color: var(--gold); text-transform: uppercase; }
    .hotbar { display: flex; gap: 4px; justify-content: center; padding: 6px; background: #120c06; border-top: 2px solid var(--gold); }
    .hb-slot { width: 44px; height: 44px; border: 2px solid #3a2a1a; border-radius: 6px; background: #2a1e14; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--dim); cursor: pointer; position: relative; }
    .hb-slot:hover { border-color: var(--gold); }
    .hb-slot .key { position: absolute; top: 2px; left: 4px; font-size: 8px; color: var(--muted); }
    .section-title { font-family: var(--font-display); font-size: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 10px; padding-left: 12px; border-left: 3px solid var(--gold); }
    .eq-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; justify-content: center; padding: 16px; }
    .eq-slot { width: 72px; height: 72px; border: 2px solid var(--gold-dim); border-radius: 8px; background: #2e1f14; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 8px; color: var(--muted); text-transform: uppercase; }
    .eq-slot:hover { border-color: var(--gold); }
    .back-link { display: inline-block; padding: 8px 16px; color: var(--gold); font-size: 0.9em; background: #14100a; }
    @media(max-width:1000px) { .left-col, .right-col { display: none; } }
  </style>
</head>
<body>
<div class="app">
  <header class="top-bar">
    <div class="logo"><a href="index.html" style="color:var(--gold)">← Hub</a> <h1 style="display:inline;margin-left:12px" class="gold-text">Grudge Warlords</h1></div>
    <div class="player-info">
      <span class="name" id="playerName">Guest</span>
      <span style="color:var(--muted);font-size:11px" id="playerClass">Lv.1</span>
    </div>
  </header>
  <div class="main-body">
    <aside class="left-col" id="leftCol"></aside>
    <main class="center-col">
      <nav class="tab-strip" id="tabStrip"></nav>
      <div class="content-area" id="contentArea"></div>
    </main>
    <aside class="right-col">
      <div class="inv-header"><h3>Inventory</h3><span style="font-family:monospace;font-size:12px;color:var(--gold)" id="goldDisplay">0 Gold</span></div>
      <div class="inv-grid" id="invGrid"></div>
    </aside>
  </div>
  <footer class="hotbar" id="hotbar"></footer>
</div>

<script>
  const CDN = 'https://molochdagod.github.io/ObjectStore';
  const TABS = ['Equipment','Attributes','Skills','Crafting','Quests'];
  let activeTab = 'Equipment', allItems = [], allRecipes = [];

  async function init() {
    const [itemsData, recipesData] = await Promise.all([
      fetch('/data/master-items.json').then(r=>r.json()),
      fetch('/data/master-recipes.json').then(r=>r.json()),
    ]);
    allItems = itemsData.items;
    allRecipes = recipesData.recipes;

    // Tab strip
    document.getElementById('tabStrip').innerHTML = TABS.map(t =>
      `<button class="tab-btn ${t===activeTab?'active':''}" onclick="switchTab('${t}')">${t}</button>`
    ).join('');

    // Left col stats
    document.getElementById('leftCol').innerHTML = `
      <div class="section-title">Combat Stats</div>
      <div class="stat-row"><span class="k">Health</span><span class="v">1000</span></div>
      <div class="stat-row"><span class="k">Mana</span><span class="v">500</span></div>
      <div class="stat-row"><span class="k">Damage</span><span class="v" style="color:var(--green)">142</span></div>
      <div class="stat-row"><span class="k">Crit %</span><span class="v">18%</span></div>
      <div class="stat-row"><span class="k">Defense</span><span class="v">88</span></div>
      <div class="stat-row"><span class="k">Block %</span><span class="v">12%</span></div>
      <div class="stat-row"><span class="k">Speed</span><span class="v">1.4</span></div>
    `;

    // Inventory grid
    document.getElementById('invGrid').innerHTML = Array(42).fill(0).map((_,i) => `<div class="inv-cell">${i<3?'':''}</div>`).join('');

    // Hotbar
    document.getElementById('hotbar').innerHTML = Array(8).fill(0).map((_,i) =>
      `<div class="hb-slot"><span class="key">${i+1}</span></div>`
    ).join('');

    renderTab();
  }

  function switchTab(t) { activeTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent===t)); renderTab(); }

  function renderTab() {
    const area = document.getElementById('contentArea');
    if (activeTab === 'Equipment') {
      const slots = ['Helm','Chest','Legs','Boots','Gloves','Cape','Mainhand','Offhand','Ring'];
      area.innerHTML = `<div class="section-title">Equipment Slots</div>
        <div class="eq-grid">${slots.map(s => `<div class="eq-slot">${s}</div>`).join('')}</div>`;
    } else if (activeTab === 'Crafting') {
      const recipes = allRecipes.slice(0, 20);
      area.innerHTML = `<div class="section-title">Crafting Recipes (${allRecipes.length} total)</div>` +
        recipes.map(r => `<div style="padding:10px;margin-bottom:6px;background:#1e1510;border-radius:8px;border-left:3px solid var(--gold)">
          <div style="font-weight:700;font-size:13px">${r.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${r.profession} · ${r.category}</div>
          <div style="font-size:10px;color:var(--dim);margin-top:4px">${r.materials.map(m=>`${m.name} ×${m.quantity}`).join(', ')}</div>
          <div style="font-size:9px;color:var(--dim);margin-top:4px;font-family:monospace">UUID: ${r.uuid}</div>
        </div>`).join('');
    } else if (activeTab === 'Skills') {
      area.innerHTML = `<div class="section-title">Weapon Skill Trees</div><p style="color:var(--muted)">Skill trees loaded from master data — ${allItems.filter(i=>i.type==='weapon').length} weapons available</p>`;
    } else if (activeTab === 'Quests') {
      area.innerHTML = `<div class="section-title">Active Quests</div><p style="color:var(--muted)">Connect to Grudge backend to view quests</p>`;
    } else {
      area.innerHTML = `<div class="section-title">${activeTab}</div><p style="color:var(--muted)">Content loaded from shared game data</p>`;
    }
  }

  init();
</script>
</body>
</html>
