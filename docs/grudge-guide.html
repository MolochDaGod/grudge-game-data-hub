<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Grudge Warlords • Guide & Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0705;--panel:#1a120c;--panel2:#221710;--panel3:#2e1f14;
  --border:#c9950a;--border2:#7a5c1e;--border-dim:#3a2a1a;
  --text:#f5e2c1;--muted:#9b7d52;--dim:#6b5535;
  --gold:#d4a400;--gold-strong:#f0c978;--gold-glow:rgba(212,164,0,.25);
  --green:#6ec96e;--red:#d45050;--blue:#5a9ad8;--purple:#a87ddb;
  --orange:#d89040;--cyan:#50b8c0;--ember:#b64f2d;
  --shadow:0 6px 24px rgba(0,0,0,.6);
  --font-display:'Cinzel',serif;
  --font-body:'Crimson Text',Georgia,serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-body);color:var(--text);min-height:100vh;
  background:
    radial-gradient(ellipse 900px 400px at 10% 0%,rgba(212,164,0,.08),transparent),
    radial-gradient(ellipse 700px 500px at 90% 100%,rgba(140,40,20,.08),transparent),
    linear-gradient(170deg,#120c06 0%,#0a0705 40%,#080604 100%);
}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#433426;border-radius:9px}
::-webkit-scrollbar-track{background:transparent}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--gold-strong)}
button{font:inherit;cursor:pointer}

.app{display:flex;flex-direction:column;min-height:100vh}
.top-bar{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:14px 22px;
  background:linear-gradient(90deg,#1a100a,#221710,#1a100a);
  border-bottom:2px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,.5);flex-shrink:0;position:sticky;top:0;z-index:10;
}
.brand{display:flex;align-items:center;gap:14px}
.brand-mark{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;
  background:radial-gradient(circle at 30% 30%,rgba(240,201,120,.35),transparent 35%),
             linear-gradient(145deg,#4d3416,#1d150f);
  border:1px solid rgba(214,172,87,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:20px;color:var(--gold-strong);
}
.brand-text h1{font-family:var(--font-display);font-size:18px;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.brand-text p{font-size:12px;color:var(--muted);margin-top:2px}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.top-chip{
  padding:6px 12px;border-radius:99px;border:1px solid var(--border-dim);
  background:rgba(255,255,255,.03);font-size:11px;color:var(--muted);
  font-family:var(--font-display);letter-spacing:.8px;text-transform:uppercase;
}
.top-chip.live{color:var(--green);border-color:rgba(110,201,110,.3);background:rgba(110,201,110,.06)}

.main{display:grid;grid-template-columns:240px minmax(0,1fr);gap:18px;padding:18px;flex:1;min-height:0}
.side-nav{
  background:linear-gradient(180deg,rgba(33,25,20,.95),rgba(21,17,14,.98));
  border:1px solid rgba(214,172,87,.16);border-radius:16px;padding:14px;
  box-shadow:var(--shadow);height:fit-content;position:sticky;top:94px;
}
.nav-head{font-family:var(--font-display);font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1.4px;padding:4px 8px 8px;border-bottom:1px solid var(--border-dim);margin-bottom:8px}
.nav-btn{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:9px 10px;margin-bottom:3px;border:0;border-radius:8px;
  background:transparent;color:var(--muted);font-family:var(--font-display);
  font-size:12px;letter-spacing:.8px;text-transform:uppercase;
  transition:.15s;
}
.nav-btn:hover{background:rgba(212,164,0,.07);color:var(--text)}
.nav-btn.active{
  background:linear-gradient(90deg,rgba(212,164,0,.18),rgba(212,164,0,.04));
  color:var(--gold-strong);border-left:3px solid var(--gold);padding-left:8px;
}
.nav-btn .ico{font-size:15px;width:20px;text-align:center}

.content{
  background:linear-gradient(180deg,rgba(28,22,18,.95),rgba(17,14,12,.98));
  border:1px solid rgba(214,172,87,.16);border-radius:16px;
  box-shadow:var(--shadow);padding:22px;overflow:hidden;
}

.hero{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:22px}
.hero-card{
  padding:22px;border-radius:14px;position:relative;overflow:hidden;
  background:radial-gradient(circle at 90% -20%,rgba(212,164,0,.12),transparent 55%),
             linear-gradient(135deg,#241c16,#14100b);
  border:1px solid rgba(214,172,87,.2);
}
.hero-card h2{font-family:var(--font-display);font-size:26px;color:var(--gold-strong);line-height:1.2;margin-bottom:10px}
.hero-card p{color:var(--muted);line-height:1.55;font-size:15px;max-width:60ch}
.hero-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.hero-tag{padding:5px 10px;border-radius:99px;font-size:11px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.8px;border:1px solid var(--border-dim);background:rgba(255,255,255,.03);color:var(--text)}
.hero-side{
  padding:18px;border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
  border:1px solid rgba(214,172,87,.14);
}
.hero-side h3{font-family:var(--font-display);font-size:13px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.hero-side ul{display:grid;gap:8px}
.hero-side li{font-size:13px;color:var(--muted);padding-left:16px;position:relative;line-height:1.4;list-style:none}
.hero-side li::before{content:'◆';position:absolute;left:0;top:0;color:var(--gold);font-size:10px}
.hero-side li strong{color:var(--text);font-weight:700}

.section-title{
  display:flex;align-items:center;gap:10px;margin:22px 0 12px;
  font-family:var(--font-display);font-size:15px;color:var(--gold);
  text-transform:uppercase;letter-spacing:1.5px;
}
.section-title::before{content:'';width:4px;height:18px;background:var(--gold);border-radius:3px}
.section-sub{color:var(--muted);font-size:14px;line-height:1.55;margin-bottom:16px;max-width:80ch}

.grid{display:grid;gap:12px}
.grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid.cols-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}

.card{
  background:linear-gradient(135deg,rgba(34,23,16,.9),rgba(26,15,8,.9));
  border:1px solid var(--border-dim);border-radius:12px;padding:14px;
  transition:.15s;
}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card .icon{
  width:44px;height:44px;border-radius:10px;margin-bottom:10px;
  background:radial-gradient(circle,rgba(212,164,0,.15),transparent),linear-gradient(145deg,#45301d,#231912);
  border:1px solid rgba(214,172,87,.25);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  overflow:hidden;
}
.card .icon img{width:100%;height:100%;object-fit:contain}
.card h3{font-family:var(--font-display);font-size:15px;color:var(--gold-strong);margin-bottom:4px}
.card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.card p{font-size:13px;color:var(--muted);line-height:1.5}
.card .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  padding:3px 8px;border-radius:99px;border:1px solid;
}

.attr-card{
  padding:16px;border-radius:14px;
  background:linear-gradient(135deg,rgba(30,21,16,.95),rgba(22,14,8,.95));
  border:1px solid var(--border-dim);display:flex;gap:14px;align-items:flex-start;
}
.attr-card .ico-large{
  width:56px;height:56px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  background:radial-gradient(circle,rgba(212,164,0,.15),transparent),linear-gradient(145deg,#3a2717,#1a0f08);
  border:1px solid var(--border2);
}
.attr-card h3{font-family:var(--font-display);font-size:17px;color:var(--gold-strong)}
.attr-card .primary{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.attr-card .desc{font-size:13px;color:var(--muted);line-height:1.5;margin-top:8px}
.attr-card .formula{
  display:inline-block;margin-top:8px;padding:4px 8px;
  background:rgba(0,0,0,.35);border:1px solid var(--border-dim);border-radius:6px;
  font-family:var(--font-mono);font-size:11px;color:var(--cyan);
}
.gains-title{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-top:12px;font-weight:700}
.gains-list{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin-top:6px}
.gains-list li{list-style:none;font-size:11px;color:var(--text);font-family:var(--font-mono)}
.gains-list li span{color:var(--muted)}

.stat-table{
  width:100%;border-collapse:collapse;font-size:13px;
  background:linear-gradient(180deg,rgba(30,21,16,.9),rgba(20,14,8,.9));
  border:1px solid var(--border-dim);border-radius:10px;overflow:hidden;
}
.stat-table th{
  background:rgba(212,164,0,.08);color:var(--gold);
  text-align:left;padding:10px 14px;font-family:var(--font-display);
  font-size:11px;text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid var(--border-dim);
}
.stat-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text)}
.stat-table td.key{color:var(--gold-strong);font-weight:600}
.stat-table td.mono{font-family:var(--font-mono);font-size:12px;color:var(--cyan)}
.stat-table tr:hover td{background:rgba(212,164,0,.04)}
.stat-table tr:last-child td{border-bottom:none}

.tier-ladder{display:grid;gap:10px;margin-top:12px}
.tier-row{
  padding:14px;border-radius:12px;border:2px solid;
  background:linear-gradient(90deg,rgba(255,255,255,.03),transparent);
  display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
}
.tier-row .tier-badge{
  padding:5px 12px;border-radius:8px;font-family:var(--font-display);
  font-size:12px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;
  border:1px solid currentColor;
}
.tier-row .tier-desc{color:var(--text);font-size:13px;line-height:1.5}
.tier-row .tier-desc small{color:var(--muted);display:block;margin-top:3px;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.tier-row .tier-rank{font-family:var(--font-mono);font-size:14px;color:var(--gold-strong);font-weight:700}
.tier-row.legendary{border-color:#89f7fe;box-shadow:0 0 20px rgba(137,247,254,.1)}
.tier-row.legendary .tier-badge{color:#89f7fe;background:rgba(137,247,254,.1)}
.tier-row.warlord{border-color:#f97316;box-shadow:0 0 20px rgba(249,115,22,.1)}
.tier-row.warlord .tier-badge{color:#f97316;background:rgba(249,115,22,.1)}
.tier-row.epic{border-color:#a855f7;box-shadow:0 0 20px rgba(168,85,247,.1)}
.tier-row.epic .tier-badge{color:#a855f7;background:rgba(168,85,247,.1)}
.tier-row.hero{border-color:#3b82f6;box-shadow:0 0 20px rgba(59,130,246,.1)}
.tier-row.hero .tier-badge{color:#3b82f6;background:rgba(59,130,246,.1)}
.tier-row.normal{border-color:#9ca3af}
.tier-row.normal .tier-badge{color:#9ca3af;background:rgba(156,163,175,.1)}

.weapon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.weapon-chip{
  padding:12px;border-radius:10px;text-align:center;
  background:linear-gradient(135deg,rgba(34,23,16,.85),rgba(26,15,8,.85));
  border:1px solid var(--border-dim);cursor:pointer;transition:.15s;
}
.weapon-chip:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.weapon-chip .w-ico{
  width:64px;height:64px;margin:0 auto 8px;border-radius:10px;
  background:radial-gradient(circle,rgba(212,164,0,.12),transparent),linear-gradient(145deg,#3a2717,#1a0f08);
  border:1px solid var(--border-dim);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  overflow:hidden;
}
.weapon-chip .w-ico img{width:100%;height:100%;object-fit:contain;padding:6px}
.weapon-chip h4{font-family:var(--font-display);font-size:12px;color:var(--gold-strong);margin-bottom:2px}
.weapon-chip .w-count{font-size:10px;color:var(--muted);font-family:var(--font-mono)}

.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:10px}
.skill-box{
  padding:12px;border-radius:10px;display:flex;gap:10px;
  background:linear-gradient(135deg,rgba(30,21,16,.9),rgba(22,14,8,.9));
  border:1px solid var(--border-dim);
}
.skill-box.unique{border-color:rgba(212,164,0,.4);box-shadow:0 0 12px rgba(212,164,0,.08)}
.skill-box .s-ico{
  width:40px;height:40px;border-radius:8px;flex-shrink:0;
  background:radial-gradient(circle,rgba(212,164,0,.12),transparent);
  border:1px solid var(--border-dim);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.skill-box h5{font-family:var(--font-display);font-size:13px;color:var(--text);line-height:1.2}
.skill-box h5.unique-name{color:var(--gold-strong)}
.skill-box .s-meta{font-size:10px;color:var(--muted);font-family:var(--font-mono);margin:3px 0 4px}
.skill-box .s-desc{font-size:11px;color:var(--muted);line-height:1.4}

.pipeline{display:grid;gap:10px;margin-top:12px}
.pipeline-step{
  padding:14px 16px;border-radius:10px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:flex-start;
  background:linear-gradient(90deg,rgba(30,21,16,.9),rgba(22,14,8,.9));
  border:1px solid var(--border-dim);border-left:3px solid var(--gold);
}
.pipeline-num{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle,rgba(212,164,0,.2),transparent);
  border:1px solid var(--gold);color:var(--gold);
  font-family:var(--font-display);font-weight:700;font-size:14px;flex-shrink:0;
}
.pipeline-step h4{font-family:var(--font-display);font-size:14px;color:var(--gold-strong);margin-bottom:4px}
.pipeline-step p{font-size:13px;color:var(--muted);line-height:1.5}

.bullet-list{display:grid;gap:6px;margin-top:8px}
.bullet-list li{list-style:none;font-size:13px;color:var(--muted);padding-left:18px;position:relative;line-height:1.55}
.bullet-list li::before{content:'▶';position:absolute;left:0;top:2px;color:var(--gold);font-size:9px}
.bullet-list li strong{color:var(--text)}

.callout{
  padding:14px 16px;border-radius:10px;margin-top:10px;
  background:linear-gradient(90deg,rgba(212,164,0,.08),rgba(212,164,0,.02));
  border:1px solid rgba(212,164,0,.25);border-left:3px solid var(--gold);
  font-size:13px;color:var(--text);line-height:1.55;
}
.callout strong{color:var(--gold-strong)}

@media(max-width:900px){
  .main{grid-template-columns:1fr}
  .side-nav{position:static;display:flex;flex-wrap:wrap;gap:6px;padding:10px}
  .nav-head{width:100%;border-bottom:none;margin-bottom:4px}
  .nav-btn{width:auto;flex:1 1 120px}
  .nav-btn.active{border-left:0;border-bottom:3px solid var(--gold);padding-left:10px}
  .hero{grid-template-columns:1fr}
  .gains-list{grid-template-columns:1fr}
}
@media(max-width:600px){
  .top-bar{padding:10px 12px}
  .brand-text h1{font-size:14px}
  .main{padding:12px}
  .content{padding:16px}
}
</style>
</head>
<body>
<div class="app">
  <header class="top-bar">
    <div class="brand">
      <div class="brand-mark">⚔</div>
      <div class="brand-text">
        <h1>Grudge Warlords</h1>
        <p>Official Guide &amp; Codex</p>
      </div>
    </div>
    <div class="top-actions">
      <span class="top-chip live">● Live Data</span>
      <a class="top-chip" href="https://molochdagod.github.io/ObjectStore/" target="_blank">ObjectStore API</a>
      <a class="top-chip" href="mainpanel.html">Main Panel →</a>
    </div>
  </header>

  <div class="main">
    <aside class="side-nav">
      <div class="nav-head">Learn</div>
      <button class="nav-btn active" data-section="welcome"><span class="ico">🏰</span>Welcome</button>
      <button class="nav-btn" data-section="races"><span class="ico">🧬</span>Races</button>
      <button class="nav-btn" data-section="classes"><span class="ico">⚔</span>Classes</button>
      <button class="nav-btn" data-section="attributes"><span class="ico">💪</span>Attributes</button>
      <button class="nav-btn" data-section="derived"><span class="ico">📊</span>Derived Stats</button>
      <button class="nav-btn" data-section="combat"><span class="ico">🎯</span>Combat Flow</button>
      <button class="nav-btn" data-section="weapons"><span class="ico">🗡</span>Weapons</button>
      <button class="nav-btn" data-section="skills"><span class="ico">✨</span>Weapon Skills</button>
      <button class="nav-btn" data-section="armor"><span class="ico">🛡</span>Armor &amp; Slots</button>
      <button class="nav-btn" data-section="professions"><span class="ico">⛏</span>Professions</button>
      <button class="nav-btn" data-section="tiers"><span class="ico">👑</span>Build Tiers</button>
      <button class="nav-btn" data-section="world"><span class="ico">🗺</span>World &amp; Factions</button>
      <button class="nav-btn" data-section="glossary"><span class="ico">📖</span>Glossary</button>
    </aside>

    <main class="content" id="content"><div style="text-align:center;padding:40px;color:var(--muted)">Loading guide…</div></main>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   GRUDGE WARLORDS — GUIDE ENGINE
   Data source: https://molochdagod.github.io/ObjectStore/
   ═══════════════════════════════════════════════════════════ */
const CDN = 'https://molochdagod.github.io/ObjectStore';
const ICON = p => CDN + '/' + String(p).replace(/^\//,'');

/* Any broken <img> falls back to its emoji */
function imgOrEmoji(path, emoji, size){
  const s = size || 44;
  const safe = (emoji || '').replace(/'/g,"\\'");
  return '<img src="'+ICON(path)+'" alt="" onerror="this.outerHTML=\'<span style=&quot;font-size:'+Math.round(s*0.6)+'px&quot;>'+safe+'</span>\'"/>';
}

/* ─── 8 Attributes (Character Builder data) ─── */
const ATTRIBUTES = [
  {id:'Strength',emoji:'💪',color:'#ef4444',tagline:'Physical might and raw power',
   desc:'Strength raises melee damage, physical defense, max HP, and enables heavy weapons. Primary attribute for Warriors, Barbarians, and Orcs. Diminishing returns past 50 points in the scaling stats.',
   formula:'Physical Dmg = Base × (1 + STR × 0.05)',
   gains:[['Health','+5'],['Physical Damage','+1.25'],['Physical Defense','+4'],['Block Chance','+0.2%'],['Lifesteal','+0.075%'],['Stagger on Hit','+0.04%'],['Mana Pool','+1'],['Stamina','+0.8'],['Attack Accuracy','+0.08%'],['Health Regen/s','+0.02'],['Damage Reduction','+0.02%']]},
  {id:'Intellect',emoji:'🧠',color:'#8b5cf6',tagline:'Mental acuity and spellcasting power',
   desc:'Powers magical damage, mana pool, and cooldown reduction. Essential for Mage Priests. High INT shortens cast times by 0.2% per point. Countered by enemy Resistance.',
   formula:'Magic Dmg = Base × (1 + INT × 0.05)',
   gains:[['Mana Pool','+9'],['Magical Damage','+1.5'],['Magical Defense','+2'],['Mana Regen/s','+0.04'],['Cooldown Reduction','+0.075%'],['Spell Accuracy','+0.15%'],['Health','+3'],['Stamina','+0.4'],['Attack Accuracy','+0.1%'],['Ability Cost','-0.05%']]},
  {id:'Vitality',emoji:'❤️',color:'#22c55e',tagline:'Physical endurance and life force',
   desc:'The tank stat. Huge HP, bleed resistance, armor rating, and passive health regen. Weak to %-based damage but brutal against burst. Core to Undead and Dwarven builds.',
   formula:'Max HP = 100 + (VIT × 12)',

    <div class="section-title">Core Gameplay Loop</div>

      <div class="pipeline-step"><div class="pipeline-num">1</div><div><h4>Harvest</h4><p>Herbalism, Mining, Fishing, Skinning, and Logging. Gather raw resources and level profession trees toward higher-tier nodes.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">2</div><div><h4>Fight</h4><p>World bosses, faction skirmishes, dungeons, and PvP duels. Faction level gates which missions you can take.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">3</div><div><h4>Sail &amp; Explore</h4><p>Travel between the 33 map locations across 5 regions. Uncover lore, unlock waygates, and watch cinematic cutscenes.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">4</div><div><h4>Compete</h4><p>Arena brackets, crew tournaments, and weekly rally goals. Survivors may plant a Pirate Claim to secure a home base.</p></div></div>

  attributes: () => `
    <div class="section-title">The Eight Attributes</div>

  `,

  derived: () => `
    <div class="section-title">37 Derived Stats</div>
    <div class="section-sub">Every stat a target can be hit by or protect against. These are fully calculated from your 8 attribute values plus gear, buffs, and the Tactics multiplier.</div>
    <table class="stat-table">
      <thead><tr><th style="width:28%">Stat</th><th style="width:42%">What it does</th><th>Fed by</th></tr></thead>
      <tbody>${DERIVED_STATS.map(s=>`<tr><td class="key">${s.k}</td><td>${s.d}</td><td class="mono">${s.src}</td></tr>`).join('')}</tbody>
    </table>
    <div class="callout" style="margin-top:14px">
      <strong>Combat Power formula:</strong> CP = floor(EHP × 0.4 + DPS × 2.5 + Utility × 5)<br>
      Where <span style="font-family:var(--font-mono);color:var(--cyan)">EHP = HP × (1+DEF/100) × (1+RES/100)</span>,
      <span style="font-family:var(--font-mono);color:var(--cyan)">DPS = (DMG+10) × (1+Crit×CritDmg) × (1+AS)</span>, and
      <span style="font-family:var(--font-mono);color:var(--cyan)">Utility = CDR×2 + ManaRegen×10 + MS×2</span>.
    </div>
  `,

  combat: () => `
    <div class="section-title">Combat Flow</div>
    <div class="section-sub">An 8-step pipeline runs on every attack. Understanding it lets you counter-pick stats and design builds that exploit specific steps.</div>
    <div class="pipeline">
      <div class="pipeline-step"><div class="pipeline-num">1</div><div><h4>Accuracy Check</h4><p>Attacker's Accuracy vs defender's Evasion. Missed attacks skip to step 8.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">2</div><div><h4>Block / Dodge / Parry</h4><p>Defender rolls Block %, Dodge (Agility CD), or Parry window (RMB+LMB for Rangers). Successful block reduces damage by Block Effect %.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">3</div><div><h4>Critical Roll</h4><p>Crit Chance vs defender's Critical Evasion. Crits bypass 40% of block chance and apply Crit Damage %.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">4</div><div><h4>Armor &amp; Resistance</h4><p>Physical damage is reduced by Defense (subtracted), Armor (flat), and Damage Reduction %. Magical damage uses Resistance %.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">5</div><div><h4>Penetration</h4><p>Armor Penetration % and Block Penetration % bypass portions of defense. Defense Break debuffs apply here.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">6</div><div><h4>Damage Application</h4><p>Final damage is subtracted from HP. If HP hits 0, the target dies. In PvP, permadeath applies to the crew's daily cycle.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">7</div><div><h4>Status / DoT</h4><p>Bleed, burn, poison, stun, fear, and root effects roll against resistances. Duration is reduced by CC Resistance and Status Effect %.</p></div></div>
      <div class="pipeline-step"><div class="pipeline-num">8</div><div><h4>Lifesteal &amp; Resource</h4><p>Drain Health % restores HP to the attacker. Mana/Stamina regen ticks. Cooldowns advance by (1 + CDR).</p></div></div>
    </div>

    <div class="section-title" style="margin-top:24px">Mode Toggle &amp; Controls</div>
    <ul class="bullet-list">
      <li><strong>Tab</strong> switches between <strong>Combat Mode</strong> (direction follows mouse) and <strong>Harvest Mode</strong> (direction follows movement).</li>
      <li><strong>W</strong> always moves forward relative to the camera (Fortnite-style over-shoulder).</li>
      <li><strong>Hold LMB</strong> rotates the camera; <strong>A/D</strong> turn the character; <strong>Q/E</strong> strafe.</li>
      <li><strong>Z</strong> triggers the dynamic chat-bubble combat hype system — stacking flame buffs above health.</li>
      <li><strong>Hotbar:</strong> slots 1-4 skills, slot 5 empty, slots 6-8 consumables (food / potions / on-use relics).</li>
    </ul>
  `,

  world: () => `
    <div class="section-title">World &amp; Factions</div>
    <div class="section-sub">The Shattered Wastes are divided into 5 regions and 28 zones with 112 quests and 33 map locations. Three factions vie for control; your race's bonuses alone don't lock you in, but they dictate friendly reputation on day one.</div>

    </div>

    <ul class="bullet-list">

      <li><strong>Crimson Caverns:</strong> Blood crystals and Undead necropolis events. Tier 4-5 content.</li>

  glossary: () => {
    const terms = [
      ['AoE','Area of Effect — abilities that hit multiple targets in a zone.'],
      ['Armor','Flat physical damage subtracted before %-based defense.'],
      ['CDR','Cooldown Reduction. Caps at ~40% effective.'],
      ['CP','Combat Power — composite score used to tier your build.'],
      ['Crew','A 3-5 player group sharing daily objectives and permadeath.'],
      ['Crit','Critical strike — multiplies damage by (1 + Crit Damage %).'],
      ['DoT','Damage over Time — bleed, burn, poison effects.'],
      ['EHP','Effective HP = HP × (1 + DEF/100) × (1 + RES/100).'],
      ['Grudge','A named enemy you have a personal kill contract against.'],
      ['Hotbar','Keys 1-4 skills, 5 empty, 6-8 consumables.'],
      ['HoT','Heal over Time — Nature\'s Grasp, Heal Totem.'],
      ['I-frames','Invincibility frames during dodge rolls (0.5s).'],
      ['Permadeath','Death ends your crew\'s current daily cycle.'],
      ['Pirate Claim','A flag planted by a surviving crew to claim territory.'],
      ['Signature','A class\'s unique ultimate ability.'],
      ['Synergy','Archetype bonus when your top 3 attributes align (tank/mage/rogue/support).'],
      ['Tactics','The global %-multiplier attribute — 0.5% per point.'],
      ['Tier','Item power band, T1 (starter) through T8 (relic).'],
      ['Totem','Worge summon that activates on the caster\'s turn.'],
      ['Worge Form','Bear, Raptor, or Large Bird — Worge beast transformations.']
    ];
    return `
      <div class="section-title">Glossary</div>
      <div class="section-sub">Common terms and shorthand used across the game and this guide.</div>
      <table class="stat-table">
        <thead><tr><th style="width:22%">Term</th><th>Meaning</th></tr></thead>
        <tbody>${terms.map(t=>`<tr><td class="key">${t[0]}</td><td>${t[1]}</td></tr>`).join('')}</tbody>
      </table>
    `;
  }
};

/* Wire up nav */
let activeSection = 'welcome';
function renderSection(id){
  const r = SECTIONS[id] || SECTIONS.welcome;
  document.getElementById('content').innerHTML = r();
}
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeSection = btn.dataset.section;
    renderSection(activeSection);
    document.getElementById('content').scrollIntoView({behavior:'smooth',block:'start'});
  });
});
renderSection(activeSection);
</script>

</html>
